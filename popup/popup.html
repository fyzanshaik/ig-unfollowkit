<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="popup.css" />
  <title>IG Unfollow Checker</title>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-row">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
        <span class="brand-name">Unfollow Checker</span>
      </div>
      <div id="profileChip" class="profile-chip hidden">
        <div id="profilePicWrap" class="profile-pic-wrap">
          <img id="profilePic" class="profile-pic" src="" referrerpolicy="no-referrer" />
          <span id="profilePicFallback" class="profile-pic-fallback"></span>
        </div>
        <span id="username" class="profile-chip-name"></span>
      </div>
    </div>
  </header>

  <!-- Stats -->
  <section id="statsRow" class="stats-row hidden">
    <div class="stat-card">
      <span class="stat-num" id="statFollowers">0</span>
      <span class="stat-label">Followers</span>
    </div>
    <div class="stat-card">
      <span class="stat-num" id="statFollowing">0</span>
      <span class="stat-label">Following</span>
    </div>
    <div class="stat-card stat-danger">
      <span class="stat-num" id="statNotFollowing">0</span>
      <span class="stat-label">Don't follow back</span>
    </div>
    <div class="stat-card stat-success">
      <span class="stat-num" id="statMutuals">0</span>
      <span class="stat-label">Mutuals</span>
    </div>
  </section>

  <!-- Diff banner (changes since last scan) -->
  <section id="diffSection" class="diff-section hidden">
    <div class="diff-header">
      <span class="diff-title">Changes since last scan</span>
      <span id="diffTimeAgo" class="diff-time"></span>
    </div>
    <div class="diff-grid">
      <button class="diff-card diff-card-green" data-tab="diff_newFollowers">
        <span class="diff-num" id="diffNewFollowers">0</span>
        <span class="diff-label">New followers</span>
      </button>
      <button class="diff-card diff-card-red" data-tab="diff_lostFollowers">
        <span class="diff-num" id="diffLostFollowers">0</span>
        <span class="diff-label">Lost followers</span>
      </button>
      <button class="diff-card diff-card-blue" data-tab="diff_newFollowing">
        <span class="diff-num" id="diffNewFollowing">0</span>
        <span class="diff-label">Newly following</span>
      </button>
      <button class="diff-card diff-card-amber" data-tab="diff_unfollowedByMe">
        <span class="diff-num" id="diffUnfollowedByMe">0</span>
        <span class="diff-label">I unfollowed</span>
      </button>
    </div>
  </section>

  <!-- Views -->
  <section class="view-area">
    <!-- Prompt -->
    <div id="viewPrompt" class="view view-prompt">
      <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#d4d4d8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <h2>Analyze your connections</h2>
      <p>See who doesn't follow you back, discover mutuals, and find unverified unfollowers.</p>
      <button id="btnScan" class="btn-primary">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Start Scan
      </button>
    </div>

    <!-- Progress -->
    <div id="viewProgress" class="view view-progress hidden">
      <div class="ring-wrap">
        <svg viewBox="0 0 56 56" width="52" height="52">
          <circle cx="28" cy="28" r="24" fill="none" stroke="#e4e4e7" stroke-width="3.5"/>
          <circle id="progressRing" cx="28" cy="28" r="24" fill="none" stroke="#18181b" stroke-width="3.5"
                  stroke-dasharray="150.8" stroke-dashoffset="150.8" stroke-linecap="round"
                  transform="rotate(-90 28 28)"/>
        </svg>
        <span id="progressPct" class="ring-pct">0%</span>
      </div>
      <div class="progress-text">
        <span id="progressTitle" class="progress-title">Starting...</span>
        <span id="progressDetail" class="progress-detail"></span>
      </div>
      <button id="btnCancel" class="btn-ghost btn-sm btn-danger-text">Cancel</button>
    </div>

    <!-- Complete -->
    <div id="viewComplete" class="view view-complete hidden">
      <button id="btnRescan" class="btn-ghost btn-sm">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Rescan
      </button>
    </div>

    <!-- Error -->
    <div id="viewError" class="view view-error hidden">
      <div class="error-badge">!</div>
      <p id="errorMsg" class="error-msg"></p>
      <button id="btnRetry" class="btn-primary btn-sm">Try Again</button>
    </div>
  </section>

  <!-- Results -->
  <section id="resultsSection" class="results hidden">
    <nav class="tabs">
      <button class="tab active" data-tab="dontFollowMeBack">
        <span class="tab-num" id="tabCount0">0</span>
        <span class="tab-label">Don't follow back</span>
      </button>
      <button class="tab" data-tab="dontFollowMeBackUnverified">
        <span class="tab-num" id="tabCount1">0</span>
        <span class="tab-label">Unverified</span>
      </button>
      <button class="tab" data-tab="iDontFollowBack">
        <span class="tab-num" id="tabCount2">0</span>
        <span class="tab-label">I don't follow</span>
      </button>
      <button class="tab" data-tab="mutuals">
        <span class="tab-num" id="tabCount3">0</span>
        <span class="tab-label">Mutuals</span>
      </button>
    </nav>

    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#a1a1aa" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Search username or name..." class="search-input" />
      </div>
      <div class="filter-row">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="verified">Verified</button>
        <button class="chip" data-filter="public_unverified">Public &amp; Unverified</button>
        <button class="chip" data-filter="public">Public</button>
        <button class="chip" data-filter="private">Private</button>
      </div>
    </div>

    <div id="userList" class="user-list"></div>
    <div id="resultsInfo" class="results-info"></div>
  </section>

  <!-- Footer -->
  <footer>
    <span id="lastScan" class="muted-text"></span>
    <div class="footer-btns">
      <button id="btnCopyLogs" class="btn-ghost btn-xs" title="Copy debug logs">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Logs
      </button>
      <button id="btnClearData" class="btn-ghost btn-xs" title="Clear data">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        Clear
      </button>
    </div>
  </footer>

  <div id="toast" class="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
